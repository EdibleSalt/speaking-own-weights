<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
  <style>
    .box{fill:#fff;stroke:#444;stroke-width:1.5}
    .lbl{font-size:14.5px;fill:#222}
    .sub{font-size:12px;fill:#555}
    .big{font-size:16px;font-weight:bold;fill:#1a1a1a}
    .num{font-size:12.5px;fill:#b5651d;font-family:Consolas,monospace}
    .edge{stroke:#444;stroke-width:1.6;fill:none;marker-end:url(#ar)}
    .cmp{stroke:#777;stroke-width:1.5;fill:none;stroke-dasharray:5 3}
    .res{font-size:13px;font-weight:bold}
  </style>

  <text x="480" y="28" text-anchor="middle" class="big">Making a model &#8220;speak&#8221; its own embedding parameters: setup and the verbalization gap</text>

  <!-- word -->
  <rect class="box" x="24" y="212" width="104" height="52" rx="8"/>
  <text x="76" y="235" text-anchor="middle" class="lbl">Word w</text>
  <text x="76" y="254" text-anchor="middle" class="num">(e.g., " cat")</text>

  <!-- LLM -->
  <rect class="box" x="156" y="198" width="140" height="80" rx="8" fill="#eef3fb"/>
  <text x="226" y="230" text-anchor="middle" class="big">LLM</text>
  <text x="226" y="250" text-anchor="middle" class="sub">(open weights,</text>
  <text x="226" y="266" text-anchor="middle" class="sub">ground truth known)</text>
  <path class="edge" d="M128,238 L154,238"/>

  <!-- two readout branches from LLM -->
  <path class="edge" d="M296,214 C372,176 392,112 466,110"/>
  <path class="edge" d="M296,262 C372,302 392,392 466,394"/>

  <!-- (1) probe / decode  (TOP) -->
  <rect class="box" x="452" y="80" width="334" height="62" rx="8" fill="#f0f7f0"/>
  <text x="619" y="105" text-anchor="middle" class="lbl">&#9312; Probe: <tspan style="font-weight:bold">decode</tspan><tspan class="sub"> linearly from a middle layer</tspan></text>
  <text x="619" y="126" text-anchor="middle" class="sub">read by an external tool, no model generation</text>

  <!-- ground truth  (MIDDLE) -->
  <rect class="box" x="498" y="206" width="252" height="74" rx="8" fill="#f7f7f7"/>
  <text x="624" y="232" text-anchor="middle" class="lbl">true embedding row e(w)</text>
  <text x="624" y="253" text-anchor="middle" class="num">= [0.09, -0.31, ...]</text>
  <text x="624" y="272" text-anchor="middle" class="sub">a row of the weight matrix = ground truth</text>

  <!-- (2) verbalize  (BOTTOM) -->
  <rect class="box" x="452" y="364" width="334" height="62" rx="8" fill="#fdf3ec"/>
  <text x="619" y="389" text-anchor="middle" class="lbl">&#9313; Model <tspan style="font-weight:bold">verbalizes</tspan><tspan class="num"> "0.12, -0.34, ..."</tspan></text>
  <text x="619" y="410" text-anchor="middle" class="sub">generated in words by the model itself</text>

  <!-- dashed RSA comparisons to the middle box -->
  <path class="cmp" d="M624,142 L624,204"/>
  <text x="636" y="170" class="res" fill="#2e7d32">RSA &#8776; 0.45-0.68</text>
  <text x="636" y="187" class="sub">decodable inside the model</text>
  <path class="cmp" d="M624,362 L624,282"/>
  <text x="636" y="318" class="res" fill="#b5651d">RSA &#8776; 0.01</text>
  <text x="636" y="335" class="sub">zero-shot &#8594; 0.50 fine-tuned</text>

  <!-- gap brace (difference between the two RSAs) -->
  <path d="M856,158 C872,158 872,322 856,322" stroke="#c0392b" stroke-width="2.2" fill="none"/>
  <text x="892" y="240" text-anchor="middle" class="res" fill="#c0392b" transform="rotate(-90 892 240)">verbalization gap &#8776; 45&#215;</text>
  <text x="820" y="240" text-anchor="middle" class="sub" transform="rotate(-90 820 240)">difference between the two RSAs</text>

  <text x="480" y="456" text-anchor="middle" class="sub">The same embedding information: a probe can &#9312; decode it (&#8776;0.5), yet zero-shot the model can barely &#9313; speak it (&#8776;0.01);</text>
  <text x="480" y="472" text-anchor="middle" class="sub">the difference is the verbalization gap, bridgeable by LoRA fine-tuning.</text>
</svg>
